name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Build apps
        run: npm run build

      - name: Build backend Docker image
        run: docker build -f backend/Dockerfile -t starvnt-vendor-api .

      - name: Build frontend Docker image
        run: docker build -f frontend/Dockerfile --build-arg VITE_API_URL=http://localhost:4000 -t starvnt-vendor-web .
